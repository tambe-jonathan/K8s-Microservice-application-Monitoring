adminUser: admin
adminPassword: admin

service:
  type: ClusterIP

sidecar:
  dashboards:
    enabled: true
grafana:
  sidecar:
    dashboards:
      enabled: true

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards

  dashboardsConfigMaps:
    default: grafana-dashboards
